apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR-USERNAME/eventyx-gitops-manifests.git
    targetRevision: main
    path: apps/podinfo/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: podinfo

  syncPolicy:
    automated:
      prune: true        # Delete resources removed from Git
      selfHeal: true     # Auto-sync if cluster drifts from Git
    syncOptions:
    - CreateNamespace=true

  # Optional: Health assessment
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
